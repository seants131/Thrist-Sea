<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thirst Sea - Survival Prototype</title>
    <link rel="stylesheet" href="/src/style.css">
</head>
<body>
    <div id="ui">
        <div>Coal: <span id="coal-count">100</span></div>
        <div>Status: <span id="status">Running</span></div>
        <div>Time: <span id="time-count">0</span></div>
        <div>Phase: <span id="phase">Day</span></div>
    </div>
    <div id="game-container"></div>
    
    <div id="build-menu">
        <button id="btn-house">Build: House (Cost: 10 Coal)</button>
        <button id="btn-gathering">Build: Gathering Post (Cost: 20 Coal)</button>
        <button id="btn-cancel">Cancel / Normal Mode</button>
    </div>

    <script type="module" src="/src/main.js"></script>
</body>
</html>
